# ReleaseFlow YAML config — an alternative to the Gradle DSL.
# If both exist, the DSL block in build.gradle.kts takes precedence.
# ${VAR_NAME} placeholders are resolved from environment variables at runtime.

project:
  name: SampleApp

environments:
  qa:
    build:
      flavor: qa
      type: debug
    storage:
      google_drive:
        # Just paste a Drive folder URL — no service account needed.
        # First-time setup: ./gradlew releaseFlowLogin
        folder_url: "https://drive.google.com/drive/folders/REPLACE_WITH_YOUR_FOLDER_ID"
    notifications:
      email:
        # mode "browser" (default): opens Gmail compose, you click Send. No credentials.
        # mode "smtp": sends programmatically. Requires username + password.
        mode: browser
        to:
          - qa@example.com
          - lead@example.com
        cc:
          - pm@example.com
        bcc:
          - releases-archive@example.com
    changelog:
      enabled: true
      format: plain

  staging:
    build:
      flavor: staging
      type: release
    storage:
      google_drive:
        folder_url: "https://drive.google.com/drive/folders/REPLACE_WITH_YOUR_FOLDER_ID"
    notifications:
      email:
        mode: browser
        to:
          - staging@example.com
    changelog:
      enabled: true
      format: markdown

  production:
    build:
      flavor: prod
      type: release
    storage:
      google_drive:
        folder_url: "https://drive.google.com/drive/folders/REPLACE_WITH_YOUR_FOLDER_ID"
    notifications:
      email:
        # CI example: use SMTP with environment variables
        mode: smtp
        to:
          - releases@example.com
          - cto@example.com
        smtp_host: smtp.gmail.com
        smtp_port: 587
        username: ${RF_EMAIL_USER}
        password: ${RF_EMAIL_PASS}
    changelog:
      enabled: true
      format: markdown
